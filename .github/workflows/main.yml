name: Supreme Cloud APK Build
on: [push]

env:
  # Node 24 Force Enable to bypass deprecation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Industrial Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf automake libtool libtool-bin m4           pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake           libffi-dev libssl-dev openjdk-17-jdk ant
          pip install --upgrade pip buildozer cython kivy kivymd

      - name: Config Management & Validation
        run: |
          buildozer init
          python3 -c "
          c = open('buildozer.spec').read()
          c = c.replace('package.name = myapp', 'package.name = supremesia')
          c = c.replace('android.archs = armeabi-v7a', 'android.archs = arm64-v8a')
          c = c.replace('# android.accept_sdk_license = False', 'android.accept_sdk_license = True')
          c = c.replace('# android.sdk = 31', 'android.sdk = 33')
          c = c.replace('# android.ndk = 25b', 'android.ndk = 25b')
          open('buildozer.spec', 'w').write(c)
          "
          # Validation
          grep "arm64-v8a" buildozer.spec && echo "Config Validated"

      - name: Autonomous Build
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          yes | buildozer --verbose android debug

      - name: Audit & Deliver
        run: |
          ls -lh bin/
          if [ -z \"$(ls -A bin/*.apk)\" ]; then echo 'APK Generation Failed'; exit 1; fi

      - name: Deliver SIA Weapon
        uses: actions/upload-artifact@v4
        with:
          name: SIA-Supreme-Weapon
          path: bin/*.apk
