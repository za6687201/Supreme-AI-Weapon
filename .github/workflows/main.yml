name: Supreme Cloud APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Force Install All Build Tools
        run: |
          sudo apt update
          # Har missing library aur tool jo logs mein error de rahi thi
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev openjdk-17-jdk ant python3-dev build-essential
          pip install buildozer cython kivy
      - name: Clean and Configure Buildozer
        run: |
          buildozer init
          # Master Config for OPPO A78
          sed -i 's/package.name = myapp/package.name = supremesia/' buildozer.spec
          sed -i 's/android.archs = armeabi-v7a/android.archs = arm64-v8a/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/# android.sdk = 31/android.sdk = 33/' buildozer.spec
          sed -i 's/# android.ndk = 25b/android.ndk = 25b/' buildozer.spec
      - name: Build APK (Bypass Config Errors)
        run: |
          # Environment variables to fix Libffi and Autoconf issues
          export CFLAGS="-DIF_LIBFFI_H"
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          buildozer --verbose android debug
      - name: Upload God-Level APK
        uses: actions/upload-artifact@v4
        with:
          name: SIA-Supreme-Weapon
          path: bin/*.apk
