name: Supreme Cloud APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: |
          pip install buildozer cython kivy
          sudo apt update
          sudo apt install -y git zip unzip autoconf autotools-dev libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev openjdk-17-jdk
      - name: Build APK (Bypass All Checks)
        run: |
          buildozer init
          # Master Configuration for OPPO A78
          sed -i 's/package.name = myapp/package.name = supremesia/' buildozer.spec
          sed -i 's/android.archs = armeabi-v7a/android.archs = arm64-v8a/' buildozer.spec
          # License & Aidl Power Fix
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/# android.sdk = 31/android.sdk = 33/' buildozer.spec
          # Forcing Buildozer to auto-accept licenses in terminal
          yes | buildozer android debug
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SIA-Supreme-Weapon
          path: bin/*.apk
